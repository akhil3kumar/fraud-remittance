<div class="form-container">
  <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="login-form">
    <h2 class="form-title">Login Page</h2>
    <div class="email-inputs">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        placeholder="email id"
        formControlName="email"
        autocomplete="email"
      />
      <div class="error">
        <span *ngIf="(email.touched || email.dirty) && email.errors?.['required']"
          >Field can't be empty</span
        >
        <span *ngIf="(email.touched || email.dirty) && email.errors?.['email']"
          >Write the valid mail id</span
        >
      </div>
    </div>

    <div class="password-inputs">
      <label for="password">Password:</label>

      <div class="password-wrapper">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Write Password"
          formControlName="password"
          autocomplete="current-password"
        />

        <button type="button" class="toggle-password" (click)="togglePassword()">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <div class="error">
        <span *ngIf="(password.touched || password.dirty) && password.errors?.['required']">
          Password is required
        </span>
      </div>
    </div>
    <div class="form-button">
      <button type="submit" [disabled]="loginForm.invalid">Submit</button>
    </div>
    <a class="forgot-password" href="#"> Forgot Password? </a>
    <span
      >New User?
      <a class="forgot-password" routerLink="/auth/register"> create new account </a>
    </span>
  </form>
</div>
