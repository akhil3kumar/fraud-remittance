spring:
  application:
    name: transaction-service
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_remittance
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8083

batch:
  transaction:
    file-path: file:/Users/akhil/Downloads/archive/Data/Transaction Data/transaction_records.csv
  transactionMetadata:
    file-path: file:/Users/akhil/Downloads/archive/Data/Transaction Data/transaction_metadata.csv