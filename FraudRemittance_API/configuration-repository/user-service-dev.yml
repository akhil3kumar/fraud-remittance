spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_remittance
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: true # Prevents the server from registering as a client to itself
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka