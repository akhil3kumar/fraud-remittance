spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_remittance
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  management:
    endpoints:
      web:
        exposure:
          include: refresh

eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8082

batch:
  customer:
    file-path: file:/Users/akhil/Downloads/archive/Data/Customer Profiles/customer_data.csv
  account-activity:
    file-path: file:/Users/akhil/Downloads/archive/Data/Customer Profiles/account_activity.csv
